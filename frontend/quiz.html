<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nursing Quiz - Management System</title>
  <style>
    /* Modern Font Import */
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

    /* Base Body Styling - Energetic Indigo Theme */
    body { 
        font-family: 'Inter', sans-serif; 
        padding: 20px; 
        background-color: #eef2ff; /* Indigo-50 */
        /* BACKGROUND IMAGE PLACEHOLDER: Un-comment the line below to add an image later */
        /* background-image: url('your-image.jpg'); */
        background-size: cover;
        background-attachment: fixed;
        color: #312e81; /* Indigo-900 */
        line-height: 1.6;
        margin: 0;
    }

    /* Navigation & Headers */
    a { 
        color: #4f46e5; 
        text-decoration: none; 
        font-weight: 600; 
        padding: 6px 12px; 
        border-radius: 6px; 
        transition: background 0.2s ease;
    }
    a:hover { background: #e0e7ff; text-decoration: none; }
    
    .topbar { display:flex; justify-content: space-between; align-items:center; gap:12px; flex-wrap:wrap; margin-bottom: 20px; }
    .topbar h1 { color: #4338ca; margin:0; }
    
    /* Layout & Utilities */
    .row { display:flex; gap:10px; align-items:center; flex-wrap:wrap; }
    .muted { color:#6b7280; font-weight: 500; }
    
    /* Center the quiz panel */
    .panel { 
        background: rgba(255, 255, 255, 0.98); 
        padding: 30px; 
        border-radius: 12px; 
        box-shadow: 0 10px 20px rgba(0,0,0,0.05); 
        max-width: 800px;
        margin: 14px auto 0 auto; 
    }

    /* Score Pill */
    .pill { 
        font-size: 0.95rem; 
        font-weight: 600;
        background: #e0e7ff; 
        color: #4338ca;
        border: none; 
        padding: 8px 16px; 
        border-radius: 999px; 
    }

    /* ── Animated Buttons (Next, Restart) ── */
    /* Excludes .choice (MCQ options) which have their own hover style */
    button:not(.choice) { 
        position: relative;
        overflow: hidden;
        padding: 10px 20px; 
        background: #4f46e5; 
        color: white; 
        border: none; 
        border-radius: 8px; 
        font-weight: 600;
        font-family: 'Inter', sans-serif;
        cursor: pointer; 
        transition: all 0.6s cubic-bezier(0.23, 1, 0.320, 1);
    }

    button:not(.choice)::after {
        content: '';
        position: absolute;
        top: 50%; left: 50%;
        transform: translate(-50%, -50%);
        width: 0; height: 0;
        background: rgba(255, 255, 255, 0.18);
        border-radius: 50%;
        opacity: 0;
        transition: all 0.8s cubic-bezier(0.23, 1, 0.320, 1);
        pointer-events: none;
    }

    button:not(.choice):hover:not(:disabled) { 
        box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.30);
    }
    button:not(.choice):hover:not(:disabled)::after {
        width: 220px; height: 220px;
        opacity: 1;
    }
    button:not(.choice):active:not(:disabled) { scale: 0.95; }
    button:not(.choice):disabled { background: #a5b4fc; cursor: not-allowed; }
    
    #restart { background: #64748b; }
    #restart:hover:not(:disabled) {
        box-shadow: 0 0 0 4px rgba(100, 116, 139, 0.28);
    }

    /* Typography inside Panel */
    #progress { font-size: 0.9rem; text-transform: uppercase; letter-spacing: 0.5px; }
    #question { font-size: 1.4rem; color: #1e293b; margin: 10px 0 20px 0; line-height: 1.4; }

    /* Multiple Choice Options */
    .choices { display:grid; grid-template-columns: 1fr; gap:12px; margin-top: 12px; }
    .choice { 
        text-align:left; 
        background:#f8fafc; 
        color:#1e293b; 
        border: 2px solid #e2e8f0; 
        padding: 16px 20px;
        border-radius: 10px;
        font-size: 1.05rem;
        cursor: pointer;
        transition: all 0.2s ease;
    }
    
    /* Interactive Hover Effect */
    .choice:hover:not(:disabled) { 
        background:#e0e7ff; 
        border-color: #818cf8;
        transform: translateX(6px); 
    }
    
    /* Answer States */
    .choice.correct { 
        border-color:#10b981; 
        background:#d1fae5; 
        color: #065f46;
        font-weight: 600;
    }
    .choice.wrong { 
        border-color:#ef4444; 
        background:#fee2e2; 
        color: #991b1b;
        font-weight: 600;
    }

    /* Feedback & Explanations */
    .feedback { font-size: 1.1rem; margin-top: 20px; }
    .feedback.ok { color:#10b981; font-weight:700; }
    .feedback.err { color:#ef4444; font-weight:700; }
    
    /* BUG FIX #5: Removed the unreliable `display:none` + `:not(:empty)` CSS trick.
       Some browsers leave a whitespace text node when setting textContent = '',
       which makes :empty never match and the box stays visible incorrectly.
       Visibility is now fully controlled by setExplanation() in quiz.js instead. */
    #explanation { 
        padding: 15px; 
        background: #f1f5f9; 
        border-radius: 8px; 
        border-left: 4px solid #64748b; 
        margin-top: 15px; 
        display: none;   /* initial hidden state; JS will toggle this */
        color: #334155;
    }
  </style>
</head>
<body>
  <div class="topbar">
    <div>
      <h1 style="margin:0;">🧠 Nursing Quiz</h1>
      <div class="muted" style="margin-top:6px;">Interactive Assessment</div>
    </div>
    <div class="row">
      <span id="score-pill" class="pill">Score: 0 / 0</span>
      <a href="index.html">Medications</a>
      <a href="study.html">Study</a>
    </div>
  </div>
  <div style="height:8px; background:#e5e7eb; border-radius:6px; overflow:hidden;">
    <div id="progress-bar" style="height:100%; width:0%; background:#4f46e5; transition: width 0.3s ease;"></div>
  </div>
  <div class="panel">
    <div class="row" style="justify-content: space-between; align-items: flex-start;">
      <div style="flex: 1;">
        <div id="progress" class="muted">Loading questions...</div>
        <h2 id="question"></h2>
      </div>
      <div class="row" style="margin-left: 20px;">
        <button id="restart" type="button">Restart</button>
        <button id="next" type="button" disabled>Next</button>
      </div>
    </div>

    <div id="choices" class="choices"></div>

    <div style="margin-top: 14px;">
      <div id="feedback" class="feedback"></div>
      <div id="explanation" style="margin-top:12px;"></div>
    </div>
  </div>

  <script src="quiz.js"></script>
</body>
</html>
