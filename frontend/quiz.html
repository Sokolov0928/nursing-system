<!DOCTYPE html>
<html lang="ms">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kuiz – Sistem Kejururawatan</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Serif+Display&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --indigo:        #4f46e5;
      --indigo-dark:   #4338ca;
      --indigo-light:  #e0e7ff;
      --indigo-ring:   rgba(79,70,229,0.22);
      --indigo-glow:   rgba(79,70,229,0.22);
      --slate:         #64748b;
      --slate-dark:    #475569;
      --bg:            #f4f6fb;
      --card:          #ffffff;
      --border:        #e4e9f0;
      --text:          #2d3a4a;
      --text-head:     #0f172a;
      --green:         #10b981;
      --red:           #ef4444;
      --shadow-sm:     0 2px 8px rgba(0,0,0,0.05);
      --shadow-md:     0 6px 20px rgba(0,0,0,0.08);
      --shadow-lg:     0 16px 40px rgba(0,0,0,0.12);
    }

    body { font-family:'DM Sans',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }

    /* ── Hero ── */
    .hero {
      background: linear-gradient(135deg,#0f172a 0%,#1e1b4b 55%,#2d2580 100%);
      padding: 0 40px 72px; position: relative; overflow: hidden;
    }
    .hero::before {
      content:''; position:absolute; inset:0;
      background-image: linear-gradient(rgba(255,255,255,0.03) 1px,transparent 1px),
                        linear-gradient(90deg,rgba(255,255,255,0.03) 1px,transparent 1px);
      background-size: 40px 40px; pointer-events: none;
    }
    .hero::after {
      content:''; position:absolute; top:-80px; right:-60px; width:360px; height:360px;
      background: radial-gradient(circle,rgba(79,70,229,0.22) 0%,transparent 70%);
      pointer-events: none;
    }
    .hero-orb2 {
      position:absolute; bottom:-50px; left:15%; width:240px; height:240px;
      background: radial-gradient(circle,rgba(99,102,241,0.14) 0%,transparent 70%);
      pointer-events: none;
    }

    /* Nav */
    .nav { display:flex; justify-content:space-between; align-items:center; padding:20px 0 24px; position:relative; z-index:1; }
    .logo { display:flex; align-items:center; gap:10px; text-decoration:none; }
    .logo-icon {
      width:36px; height:36px; background:linear-gradient(135deg,#4f46e5,#7c3aed);
      border-radius:9px; display:flex; align-items:center; justify-content:center;
      font-size:1.1rem; box-shadow:0 4px 12px rgba(79,70,229,0.4);
    }
    .logo-text { font-family:'DM Serif Display',serif; font-size:1.05rem; color:#fff; }
    .logo-text span { color:#a5b4fc; }
    .nav-links { display:flex; gap:4px; }
    .nav-links a {
      color:rgba(255,255,255,0.6); text-decoration:none; font-size:0.85rem;
      font-weight:500; padding:7px 13px; border-radius:8px; transition:all 0.2s;
    }
    .nav-links a:hover { background:rgba(255,255,255,0.1); color:#fff; }
    .nav-links a.active { background:rgba(255,255,255,0.14); color:#fff; }

    /* Hero body */
    .hero-body {
      position:relative; z-index:1; display:flex; justify-content:space-between;
      align-items:flex-end; flex-wrap:wrap; gap:20px;
    }
    .hero-text h1 { font-family:'DM Serif Display',serif; font-size:2rem; color:#fff; margin-bottom:6px; }
    .hero-text h1 span { color:#a5b4fc; }
    .hero-text p { color:rgba(255,255,255,0.5); font-size:0.88rem; }

    /* Score badge in hero */
    .score-badge {
      background:rgba(255,255,255,0.1); border:1px solid rgba(255,255,255,0.15);
      border-radius:14px; padding:14px 22px; text-align:center;
      backdrop-filter:blur(10px); flex-shrink:0;
    }
    .score-badge .score-num { font-family:'DM Serif Display',serif; font-size:1.8rem; color:#fff; line-height:1; }
    .score-badge .score-label { font-size:0.72rem; font-weight:600; color:rgba(255,255,255,0.5); text-transform:uppercase; letter-spacing:0.5px; margin-top:4px; }

    /* Progress bar at bottom of hero */
    .hero-progress { position:absolute; bottom:0; left:0; right:0; height:4px; background:rgba(255,255,255,0.1); }
    #progress-bar {
      height:100%; width:0%;
      background:linear-gradient(90deg,#818cf8,#a5b4fc);
      transition:width 0.4s cubic-bezier(0.4,0,0.2,1);
      border-radius:0 2px 2px 0;
    }

    /* ── Main ── */
    .main { max-width:780px; margin:0 auto; padding:0 40px 60px; }
    @media (max-width:680px) {
      .hero { padding:0 20px 64px; }
      .main { padding:0 20px 48px; }
      .hero-text h1 { font-size:1.6rem; }
      .score-badge { display:none; }
    }

    /* ── Quiz card ── */
    .quiz-card {
      background:var(--card); border-radius:20px; box-shadow:var(--shadow-lg);
      border:1px solid var(--border); padding:32px 36px;
      margin-top:-44px; position:relative; z-index:10;
      animation:riseUp 0.5s ease both;
    }
    @keyframes riseUp { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
    @media (max-width:560px) { .quiz-card { padding:24px 20px; } }

    .quiz-header {
      display:flex; justify-content:space-between; align-items:center;
      margin-bottom:22px; flex-wrap:wrap; gap:12px;
    }
    #progress {
      font-size:0.72rem; font-weight:700; text-transform:uppercase; letter-spacing:0.8px;
      background:var(--indigo-light); color:var(--indigo-dark); padding:4px 12px; border-radius:999px;
    }
    .quiz-actions { display:flex; gap:8px; }

    #question {
      font-family:'DM Serif Display',serif; font-size:1.4rem; color:var(--text-head);
      line-height:1.45; margin-bottom:24px; min-height:36px;
    }

    /* Choices */
    .choices { display:grid; grid-template-columns:1fr; gap:10px; }
    .choice {
      text-align:left; background:#f8fafc; color:var(--text-head);
      border:2px solid var(--border); padding:15px 20px; border-radius:12px;
      font-size:0.95rem; font-family:'DM Sans',sans-serif; font-weight:500;
      cursor:pointer; transition:all 0.2s ease;
    }
    .choice:hover:not(:disabled) {
      background:var(--indigo-light); border-color:#818cf8;
      transform:translateX(5px); box-shadow:var(--shadow-sm);
    }
    .choice.correct { border-color:#10b981; background:#d1fae5; color:#065f46; font-weight:700; }
    .choice.wrong   { border-color:var(--red); background:#fee2e2; color:#991b1b; font-weight:700; }

    /* Feedback */
    .feedback-area { margin-top:20px; }
    .feedback { font-size:1rem; font-weight:700; display:flex; align-items:center; gap:8px; }
    .feedback.ok  { color:var(--green); }
    .feedback.err { color:var(--red); }

    #explanation {
      padding:14px 18px; background:#f8fafc; border-radius:10px;
      border-left:4px solid var(--indigo); margin-top:14px;
      display:none; color:var(--text); font-size:0.9rem; line-height:1.65;
    }

    /* ── Buttons ── */
    button:not(.choice) {
      position:relative; overflow:hidden; padding:10px 20px; background:var(--indigo);
      color:white; border:none; border-radius:8px; font-weight:700; font-size:0.88rem;
      font-family:'DM Sans',sans-serif; cursor:pointer; white-space:nowrap;
      transition:all 0.6s cubic-bezier(0.23,1,0.32,1);
    }
    button:not(.choice)::after {
      content:''; position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
      width:0; height:0; background:rgba(255,255,255,0.18); border-radius:50%; opacity:0;
      transition:all 0.8s cubic-bezier(0.23,1,0.32,1); pointer-events:none;
    }
    button:not(.choice):hover:not(:disabled) { box-shadow:0 0 0 4px var(--indigo-ring); }
    button:not(.choice):hover:not(:disabled)::after { width:220px; height:220px; opacity:1; }
    button:not(.choice):active:not(:disabled) { scale:0.95; }
    button:not(.choice):disabled { background:#a5b4fc; cursor:not-allowed; opacity:0.7; }

    #restart { background:var(--slate); }
    #restart:hover:not(:disabled) { box-shadow:0 0 0 4px rgba(100,116,139,0.28); }
  </style>
</head>
<body>

  <!-- ── Hero ── -->
  <div class="hero">
    <div class="hero-orb2"></div>

    <div class="nav">
      <a href="dashboard.html" class="logo">
        <div class="logo-icon">🏥</div>
        <div class="logo-text">Sistem <span>Kejururawatan</span></div>
      </a>
      <nav class="nav-links">
        <a href="dashboard.html">🏠 Utama</a>
        <a href="index.html">💊 Ubatan</a>
        <a href="study.html">📚 Ulangkaji</a>
        <a href="quiz.html" class="active">🧠 Kuiz</a>
      </nav>
    </div>

    <div class="hero-body">
      <div class="hero-text">
        <h1>🧠 Mod <span>Kuiz</span></h1>
        <p>Uji pengetahuan anda dengan soalan pelbagai pilihan.</p>
      </div>
      <div class="score-badge">
        <div class="score-num" id="score-pill">0 / 0</div>
        <div class="score-label">Skor Semasa</div>
      </div>
    </div>

    <div class="hero-progress">
      <div id="progress-bar"></div>
    </div>
  </div>

  <!-- ── Main ── -->
  <div class="main">
    <div class="quiz-card">

      <div class="quiz-header">
        <div id="progress">Memuatkan…</div>
        <div class="quiz-actions">
          <button id="restart" type="button">↺ Mula Semula</button>
          <button id="next" type="button" disabled>Seterusnya →</button>
        </div>
      </div>

      <div id="question"></div>

      <div id="choices" class="choices"></div>

      <div class="feedback-area">
        <div id="feedback" class="feedback"></div>
        <div id="explanation"></div>
      </div>

    </div>
  </div>

  <script src="quiz.js"></script>
</body>
</html>
