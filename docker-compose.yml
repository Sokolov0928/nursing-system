version: '3.8'

services:
  db:
    image: postgres:16
    container_name: nursing_postgres
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
      POSTGRES_DB: nursing_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  api:
    build: .
    container_name: nursing_api
    restart: always
    depends_on:
      - db
    environment:
      PORT: 3000
      PGHOST: db
      PGPORT: 5432
      PGUSER: admin
      PGPASSWORD: admin123
      PGDATABASE: nursing_db
    ports:
      - "3000:3000"

volumes:
  pgdata: